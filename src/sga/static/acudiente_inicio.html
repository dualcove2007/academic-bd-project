<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Acudiente - INICIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; margin: 0; background-color: #A3FBB7; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background-color: #FFFFFF; display: flex; flex-direction: column; align-items: center; padding-top: 20px; padding-bottom: 25px; box-sizing: border-box; justify-content: space-between; flex-shrink: 0; }
        .sidebar-top { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .avatar-colegio { width: 150px; height: 150px; background-color: #A3FBB7; border-radius: 50%; margin-bottom: 30px; }
        .nombre-colegio { font-size: 16px; font-weight: 800; color: #000000; text-align: center; margin-bottom: 50px; }
        .menu-nav { width: 100%; padding: 0 15px; box-sizing: border-box; }
        .menu-item { font-size: 15px; font-weight: 800; color: #000000; padding: 14px 20px; margin-bottom: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }
        .menu-item.active { background-color: #4AFE6C; }
        .btn-cerrar-sesion { background-color: #008000; color: #FFFFFF; font-size: 15px; font-weight: 800; border: none; padding: 14px 24px; border-radius: 25px; cursor: pointer; width: calc(100% - 30px); margin: 0 15px; text-align: center; text-transform: uppercase; }
        .main-container { flex-grow: 1; display: flex; flex-direction: column; }
        .header-top { background-color: #FFFFFF; height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 35px; flex-shrink: 0; }
        .titulo-vista { font-size: 24px; font-weight: 800; color: #000000; }
        .usuario-info-block { display: flex; align-items: center; gap: 15px; }
        .usuario-texto { text-align: right; }
        .nombre-acudiente { font-size: 14px; font-weight: 800; color: #000000; margin-bottom: 2px; }
        .rol-acudiente { font-size: 13px; font-weight: 800; color: #FF9800; }
        .avatar-acudiente { width: 50px; height: 50px; background-color: #FFE0B2; border-radius: 50%; }
        .content-body { padding: 30px; box-sizing: border-box; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .view-wrapper { width: 100%; max-width: 1150px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .welcome-banner { background-color: #FF9800; border-radius: 15px; padding: 30px 35px; box-sizing: border-box; color: #000000; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .welcome-title { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; }
        .welcome-meta { font-size: 14px; font-weight: 800; margin: 0; }
        .table-card-wrapper { background-color: #FFFFFF; border-radius: 15px; padding: 0; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #D5FFF2; font-size: 15px; font-weight: 800; color: #000000; padding: 16px 10px; text-align: center; border: 1px solid #CCCCCC; text-transform: uppercase; }
        td { border: 1px solid #CCCCCC; padding: 16px 10px; vertical-align: middle; text-align: center; font-weight: 800; }
        .student-row { cursor: pointer; transition: background-color 0.2s; }
        .student-row:hover { background-color: #E8F5E9; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="avatar-colegio"></div>
            <div class="nombre-colegio">[NOMBRE COLEGIO]</div>
            <div class="menu-nav">
                <div class="menu-item active" onclick="window.location='acudiente_inicio.html'">&bull; INICIO</div>
                <div class="menu-item" onclick="window.location='acudiente_notas.html'">&bull; NOTAS</div>
                <div class="menu-item" onclick="window.location='acudiente_asistencia.html'">&bull; ASISTENCIA</div>
                <div class="menu-item" onclick="window.location='acudiente_observador.html'">&bull; OBSERVADOR</div>
            </div>
        </div>
        <button class="btn-cerrar-sesion" onclick="logout()">CERRAR SESION</button>
    </div>
    <div class="main-container">
        <div class="header-top">
            <div class="titulo-vista">INICIO</div>
            <div class="usuario-info-block">
                <div class="usuario-texto">
                    <div class="nombre-acudiente">[NOMBRE DEL ACUDIENTE]</div>
                    <div class="rol-acudiente">"ACUDIENTE"</div>
                </div>
                <div class="avatar-acudiente"></div>
            </div>
        </div>
        <div class="content-body">
            <div class="view-wrapper">
                <div class="welcome-banner">
                    <h2 class="welcome-title" id="welcomeTitle">Bienvenido, Acudiente</h2>
                    <p class="welcome-meta" id="welcomeMeta">Estudiantes a cargo: --</p>
                </div>
                <div class="table-card-wrapper">
                    <table>
                        <thead><tr><th>ESTUDIANTE</th><th>DOCUMENTO</th><th>GRADO</th></tr></thead>
                        <tbody id="studentsBody"><tr><td colspan="3">Cargando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
<script>
    if (!isAuthenticated()) window.location.href = 'login.html';
    const user = getUser();
    if (user) {
        document.querySelector('.nombre-acudiente').textContent = user.nombre || '[NOMBRE DEL ACUDIENTE]';
        document.getElementById('welcomeTitle').textContent = 'Bienvenido, ' + (user.nombre || 'Acudiente');
    }
    apiGet('/acudientes/mis-estudiantes').then(data => {
        const tbody = document.getElementById('studentsBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">No tiene estudiantes asignados</td></tr>';
            return;
        }
        document.getElementById('welcomeMeta').textContent = 'Estudiantes a cargo: ' + data.length;
        tbody.innerHTML = '';
        data.forEach(s => {
            const tr = document.createElement('tr');
            tr.className = 'student-row';
            tr.innerHTML = `<td>${s.nombre}</td><td>${s.documento || 'N/A'}</td><td>${s.grado || 'Sin matricula'}</td>`;
            tr.onclick = () => { localStorage.setItem('selected_student', JSON.stringify(s)); window.location.href = 'acudiente_notas.html'; };
            tbody.appendChild(tr);
        });
    }).catch(e => console.error(e));
</script>
</body>
</html>
