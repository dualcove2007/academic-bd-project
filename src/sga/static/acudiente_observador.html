<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Acudiente - OBSERVADOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; margin: 0; background-color: #A3FBB7; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background-color: #FFFFFF; display: flex; flex-direction: column; align-items: center; padding-top: 20px; padding-bottom: 25px; box-sizing: border-box; justify-content: space-between; flex-shrink: 0; }
        .sidebar-top { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .avatar-colegio { width: 150px; height: 150px; background-color: #A3FBB7; border-radius: 50%; margin-bottom: 30px; }
        .nombre-colegio { font-size: 16px; font-weight: 800; color: #000000; text-align: center; margin-bottom: 50px; }
        .menu-nav { width: 100%; padding: 0 15px; box-sizing: border-box; }
        .menu-item { font-size: 15px; font-weight: 800; color: #000000; padding: 14px 20px; margin-bottom: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }
        .menu-item.active { background-color: #4AFE6C; }
        .btn-cerrar-sesion { background-color: #008000; color: #FFFFFF; font-size: 15px; font-weight: 800; border: none; padding: 14px 24px; border-radius: 25px; cursor: pointer; width: calc(100% - 30px); margin: 0 15px; text-align: center; text-transform: uppercase; }
        .main-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header-top { background-color: #FFFFFF; height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 35px; flex-shrink: 0; }
        .titulo-vista { font-size: 24px; font-weight: 800; }
        .usuario-info-block { display: flex; align-items: center; gap: 15px; }
        .usuario-texto { text-align: right; }
        .nombre-acudiente { font-size: 14px; font-weight: 800; color: #000000; }
        .rol-acudiente { font-size: 13px; font-weight: 800; color: #FF9800; }
        .avatar-acudiente { width: 50px; height: 50px; background-color: #FFE0B2; border-radius: 50%; }
        .content-body { padding: 25px; box-sizing: border-box; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .view-wrapper { width: 100%; max-width: 1150px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .select-student { font-family: 'Open Sans', sans-serif; font-size: 14px; font-weight: 800; padding: 10px 40px 10px 15px; border: 1px solid #A6A6A6; border-radius: 6px; background: #FFFFFF; cursor: pointer; min-width: 280px; }
        .annotation-card { background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; width: 100%; }
        .annotation-body { padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        .annotation-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 14px; font-weight: 800; color: #000000; }
        .type-badge { font-size: 12px; font-weight: 800; color: #000000; padding: 5px 18px; border-radius: 15px; text-align: center; }
        .type-badge.grave { background-color: #FF0000; }
        .type-badge.felicitacion { background-color: #4AFE6C; }
        .annotation-desc { font-size: 14px; font-weight: 800; color: #000000; }
        .annotation-footer { background-color: #D9D9D9; padding: 10px 25px; box-sizing: border-box; font-size: 14px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-top">
            <div class="avatar-colegio"></div><div class="nombre-colegio">[NOMBRE COLEGIO]</div>
            <div class="menu-nav">
                <div class="menu-item" onclick="window.location='acudiente_inicio.html'">&bull; INICIO</div>
                <div class="menu-item" onclick="window.location='acudiente_notas.html'">&bull; NOTAS</div>
                <div class="menu-item" onclick="window.location='acudiente_asistencia.html'">&bull; ASISTENCIA</div>
                <div class="menu-item active">&bull; OBSERVADOR</div>
            </div>
        </div>
        <button class="btn-cerrar-sesion" onclick="logout()">CERRAR SESION</button>
    </div>
    <div class="main-container">
        <div class="header-top">
            <div class="titulo-vista">OBSERVADOR</div>
            <div class="usuario-info-block"><div class="usuario-texto"><div class="nombre-acudiente">[NOMBRE]</div><div class="rol-acudiente">"ACUDIENTE"</div></div><div class="avatar-acudiente"></div></div>
        </div>
        <div class="content-body">
            <div class="view-wrapper">
                <select class="select-student" id="studentSelect"><option>Seleccione estudiante...</option></select>
                <div id="observacionesContainer"><div class="annotation-card"><div class="annotation-body"><div class="annotation-desc">Seleccione un estudiante para ver sus anotaciones</div></div></div></div>
            </div>
        </div>
    </div>
<script>
    if (!isAuthenticated()) window.location.href = 'login.html';
    const user = getUser(); if (user) document.querySelector('.nombre-acudiente').textContent = user.nombre;
    let students = [];
    const sel = document.getElementById('studentSelect');
    const preselected = JSON.parse(localStorage.getItem('selected_student') || 'null');
    apiGet('/acudientes/mis-estudiantes').then(data => {
        students = data || [];
        sel.innerHTML = '<option value="">Seleccione estudiante...</option>';
        students.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.nombre + ' (' + s.grado + ')'; sel.appendChild(o); });
        if (preselected && students.find(s => s.id === preselected.id)) { sel.value = preselected.id; loadObservador(preselected.id); }
    }).catch(() => {});
    sel.addEventListener('change', () => loadObservador(sel.value));
    function loadObservador(sid) {
        if (!sid) { document.getElementById('observacionesContainer').innerHTML = '<div class="annotation-card"><div class="annotation-body"><div class="annotation-desc">Seleccione un estudiante</div></div></div>'; return; }
        apiGet('/acudientes/observador/' + sid).then(data => {
            const container = document.getElementById('observacionesContainer');
            if (!data || data.length === 0) { container.innerHTML = '<div class="annotation-card"><div class="annotation-body"><div class="annotation-desc">No hay anotaciones para este estudiante</div></div></div>'; return; }
            container.innerHTML = '';
            data.forEach(obs => {
                const card = document.createElement('div');
                card.className = 'annotation-card';
                const severity = (obs.tipo || '').toUpperCase().includes('GRAVE') || (obs.tipo || '').toUpperCase().includes('FALTA') ? 'grave' : 'felicitacion';
                card.innerHTML = `<div class="annotation-body">
                    <div class="annotation-meta"><span>${obs.fecha || ''}</span><span class="type-badge ${severity}">${obs.tipo || ''}</span><span>Reportado por: ${obs.reportado_por || 'Docente'}</span></div>
                    <div class="annotation-desc">${obs.descripcion || ''}</div>
                </div><div class="annotation-footer">Acudiente notificado</div>`;
                container.appendChild(card);
            });
        }).catch(() => document.getElementById('observacionesContainer').innerHTML = '<div class="annotation-card"><div class="annotation-body"><div class="annotation-desc">Error al cargar anotaciones</div></div></div>');
    }
</script>
</body>
</html>
