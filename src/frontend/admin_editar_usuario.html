<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario</title>
    
    <script src="api.js"></script>
    <style>
        /* ==========================================================================
           Reset y Estilos Base 
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #A3F7BF; /* Fondo verde menta institucional de tus prototipos */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ==========================================================================
           Boton Volver al Menú 
           ========================================================================== */
        .btn-volver {
            position: absolute;
            top: 25px;
            left: 25px;
            background-color: #00E63E; /* Verde neón llamativo */
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 8px;
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s ease;
        }

        .btn-volver:hover {
            background-color: #00C234;
        }

        /* ==========================================================================
           Tarjeta Central Blanca 
           ========================================================================== */
        .card-container {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 780px;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .form-title {
            font-size: 26px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-subtitle {
            font-size: 13px;
            color: #555555;
            margin-bottom: 35px;
        }

        /* ==========================================================================
           Estructura del Formulario (Grid de Dos Columnas)
           ========================================================================== */
        .form-grid {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin-bottom: 30px;
        }

        .form-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Línea Divisora Vertical Central */
        .divider {
            width: 1px;
            background-color: #E0E0E0;
            margin: 0 35px;
        }

        /* Bloques de Input */
        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            color: #000000;
        }

        /* Campos Editables */
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #CCCCCC;
            border-radius: 10px;
            background-color: #FFFFFF;
            color: #333333;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus:not(:disabled) {
            border-color: #00E63E; /* Enfoque verde neón */
        }

        /* Campos NO Editables (Inputs en Gris de Figma) */
        .form-group input:disabled {
            background-color: #7A7A7A; /* Color gris oscuro idéntico a la imagen */
            color: #FFFFFF;            /* Texto en blanco contrastante */
            border-color: #7A7A7A;
            cursor: not-allowed;
        }

        /* ==========================================================================
           Botón de Acción Inferior 
           ========================================================================== */
        .form-actions {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .btn-actualizar {
            background-color: #00E63E;
            color: #000000;
            border: none;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 45px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-actualizar:hover {
            background-color: #00C234;
        }

        .btn-actualizar:active {
            transform: scale(0.98);
        }

        /* ==========================================================================
           Diseño Responsivo (Para pantallas pequeñas o móviles)
           ========================================================================== */
        @media (max-width: 768px) {
            .form-grid {
                flex-direction: column;
            }
            .divider {
                display: none;
            }
            .form-column {
                margin-bottom: 18px;
            }
            body {
                padding-top: 80px;
            }
        }
    </style>
</head>
<body>

    <a href="admin_gestion_usuarios.html" class="btn-volver">VOLVER AL MENU</a>

    <div class="card-container">
        <h1 class="form-title">EDITAR USUARIO</h1>
        <p class="form-subtitle">Modifique los datos del usuario en el sistema.</p>

        <form class="edit-form">
            <div class="form-grid">
                
                <div class="form-column">
                    <div class="form-group">
                        <label for="username">USUARIO</label>
                        <input type="text" id="username" name="username" disabled>
                    </div>

                    <div class="form-group">
                        <label for="nombre_completo">NOMBRE COMPLETO</label>
                        <input type="text" id="nombre_completo" name="nombre_completo" disabled>
                    </div>

                    <div class="form-group">
                        <label for="tipo_documento">TIPO DE DOCUMENTO</label>
                        <input type="text" id="tipo_documento" name="tipo_documento" placeholder="[TIPO DE DOCUMENTO]">
                    </div>

                    <div class="form-group">
                        <label for="numero_documento">NUMERO DE DOCUMENTO</label>
                        <input type="text" id="numero_documento" name="numero_documento" placeholder="[NUMERO DE DOCUMENTO]">
                    </div>

                    <div class="form-group">
                        <label for="correo">CORREO ELECTRONICO</label>
                        <input type="email" id="correo" placeholder="[CORREO ELECTRONICO]">
                    </div>
                </div>

                <div class="divider"></div>

                <div class="form-column">
                    <div class="form-group">
                        <label for="id">ID</label>
                        <input type="text" id="id" name="id" disabled>
                    </div>

                    <div class="form-group">
                        <label for="rol">ROL</label>
                        <input type="text" id="rol" placeholder="[ROL]">
                    </div>

                    <div class="form-group">
                        <label for="password">CONTRASEÑA</label>
                        <input type="password" id="password" value="........">
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn-actualizar">ACTUALIZAR</button>
            </div>
        </form>
    </div>

<script>
    if (!isAuthenticated()) window.location.href = 'login.html';

    const id = new URLSearchParams(window.location.search).get('id');

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const user = await apiGet('/admin/usuarios/' + id);
            document.getElementById('username').value = user.username || '';
            document.getElementById('nombre_completo').value = user.nombre_completo || '';
            document.getElementById('tipo_documento').value = user.tipo_documento || '';
            document.getElementById('numero_documento').value = user.numero_documento || '';
            document.getElementById('correo').value = user.correo || '';
            document.getElementById('id').value = user.id || id;
            document.getElementById('rol').value = user.rol || '';
        } catch (err) {
            console.error('Error al cargar usuario:', err);
            alert('Error al cargar los datos del usuario');
        }
    });

    document.querySelector('.edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            nombre_completo: document.getElementById('nombre_completo').value,
            tipo_documento: document.getElementById('tipo_documento').value,
            numero_documento: document.getElementById('numero_documento').value,
            correo: document.getElementById('correo').value,
            rol: document.getElementById('rol').value,
        };
        const password = document.getElementById('password').value;
        if (password) data.password = password;

        try {
            await apiPut('/admin/usuarios/' + id, data);
            window.location.href = 'admin_gestion_usuarios.html';
        } catch (err) {
            console.error('Error al actualizar usuario:', err);
            alert('Error al actualizar el usuario');
        }
    });
</script>
</body>
</html>
